# Configuration file for Synapse.
#
# This is a YAML file: see [1] for a quick introduction. Note in particular
# that *indentation is important*: all the elements of a list or dictionary
# should have the same indentation.
#
# [1] https://docs.ansible.com/ansible/latest/reference_appendices/YAMLSyntax.html
#
# For more information on how to configure Synapse, including a complete accounting of
# each option, go to docs/usage/configuration/config_documentation.md or
# https://element-hq.github.io/synapse/latest/usage/configuration/config_documentation.html
server_name: "synapse"
pid_file: /data/homeserver.pid
listeners:
  - port: 8008
    resources:
    - compress: false
      names:
      - client
      - federation
    tls: false
    type: http
    x_forwarded: true
database:
  name: psycopg2
  allow_unsafe_locale: true
  args:
    user: msgagent
    password: msgagent
    database: synapse
    host: postgres
    cp_min: 5
    cp_max: 10

app_service_config_files:
  - "/data/mautrix-gmessages-registration.yaml"
log_config: "/data/synapse.log.config"
media_store_path: /data/media_store
registration_shared_secret: "OAE=-ASuN&Km7bIAbrb-_r8++O--ahM#eosxAL-MsY.h:a^:k@"
report_stats: false
macaroon_secret_key: "0V;iuOQfN4dzCWPaf4@jOrd+kp4NaUA2Y~U^20ck:E=BxzZ9=7"
form_secret: "f5YWjHZhlNDAR4;9QP8o9WSCzI,R:1,q57yapB6U7inA2Nu0RB"
signing_key_path: "/data/synapse.signing.key"
trusted_key_servers:
  - server_name: "matrix.org"

enable_registration: true
enable_registration_without_verification: true

# Custom rate limits
rc_message:
  per_second: 200
  burst_count: 10000

