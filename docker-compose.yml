services:
  # ─── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: messagingagent
      POSTGRES_USER: msgagent
      POSTGRES_PASSWORD: msgagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msgagent -d messagingagent"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: ma-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ma-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ma-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Application ───────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ma-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: messagingagent
      DB_USER: msgagent
      DB_PASS: msgagent
      KAFKA_BROKERS: kafka:29092
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SMPP_BIND_PORT: 2775
      JWT_SECRET: change-me-in-production-this-must-be-at-least-32-chars
      ADMIN_USER: admin
      ADMIN_PASS: changeme
      SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER: org.apache.kafka.common.serialization.StringDeserializer
      ADB_VENDOR_KEYS: /home/msgagent/.android/adbkey
      HOME: /home/msgagent
    volumes:
      - ${USERPROFILE:-.}/.android:/home/msgagent/.android:ro
      - ./android-app/apk-updates:/tmp/updates
    ports:
      - "9090:9090"   # REST API + WebSocket
      - "2775:2775"   # SMPP server port
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  admin-panel:
    build:
      context: ./admin-panel
      dockerfile: Dockerfile
    container_name: ma-admin-panel
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"       # Web admin panel

volumes:
  postgres_data:
  zookeeper_data:
  kafka_data:
  redis_data:
