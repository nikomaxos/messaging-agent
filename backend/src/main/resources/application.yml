server:
  port: 8080

spring:
  application:
    name: messaging-agent-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:messagingagent}
    username: ${DB_USER:msgagent}
    password: ${DB_PASS:msgagent}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: messaging-agent
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.messagingagent.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  security:
    jwt:
      secret: ${JWT_SECRET:change-me-in-production-at-least-32-chars}
      expiration-ms: 86400000   # 24 hours

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

app:
  smpp:
    server:
      host: ${SMPP_BIND_HOST:0.0.0.0}
      port: ${SMPP_BIND_PORT:2775}
      system-id: ${SMPP_SYSTEM_ID:MSGAGENT}
      password: ${SMPP_PASSWORD:secret}
      max-connections: 50
      enquire-link-timeout: 30000

  websocket:
    heartbeat-interval-ms: 10000

  admin:
    default-username: ${ADMIN_USER:admin}
    default-password: ${ADMIN_PASS:changeme}

logging:
  level:
    com.messagingagent: INFO
    com.cloudhopper: WARN
    org.springframework.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
